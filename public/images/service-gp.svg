<svg width="600" height="500" viewBox="0 0 600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="500" fill="#ffffff"/>
  <rect x="0" y="400" width="600" height="100" fill="#f1f5f9"/>

  <!-- Background: GP room wall detail -->
  <rect x="0" y="0" width="600" height="400" fill="#fafafa"/>
  <rect x="440" y="30" width="100" height="130" rx="6" fill="#e0f2fe" stroke="#bae6fd" stroke-width="1.5"/>
  <line x1="490" y1="30" x2="490" y2="160" stroke="#bae6fd" stroke-width="1"/>
  <line x1="440" y1="95" x2="540" y2="95" stroke="#bae6fd" stroke-width="1"/>

  <!-- Desk -->
  <rect x="100" y="286" width="400" height="20" rx="8" fill="#c2855a"/>
  <rect x="120" y="306" width="16" height="94" rx="5" fill="#a16207"/>
  <rect x="464" y="306" width="16" height="94" rx="5" fill="#a16207"/>

  <!-- Computer monitor on desk -->
  <rect x="240" y="186" width="240" height="102" rx="10" fill="#0f172a"/>
  <rect x="248" y="193" width="224" height="88" rx="6" fill="#111827"/>
  <!-- Monitor content: GP Report -->
  <text x="262" y="210" font-size="10" font-family="Arial,sans-serif" fill="#1D9E75" font-weight="bold">GP Report — Sarah M.</text>
  <text x="262" y="222" font-size="8" font-family="Arial,sans-serif" fill="#6b7280">19 May 2026 · 48 days tracked</text>
  <!-- No urgent badge -->
  <rect x="262" y="228" width="140" height="13" rx="6" fill="#052e16"/>
  <text x="332" y="238" font-size="7" font-family="Arial,sans-serif" fill="#4ade80" text-anchor="middle">No urgent symptoms</text>
  <!-- Symptom rows -->
  <rect x="262" y="245" width="96" height="4" rx="2" fill="#1e293b"/>
  <rect x="362" y="245" width="40" height="4" rx="2" fill="#ef4444" opacity="0.7"/>
  <rect x="262" y="254" width="80" height="4" rx="2" fill="#1e293b"/>
  <rect x="346" y="254" width="40" height="4" rx="2" fill="#f59e0b" opacity="0.7"/>
  <rect x="262" y="263" width="88" height="4" rx="2" fill="#1e293b"/>
  <rect x="354" y="263" width="40" height="4" rx="2" fill="#f59e0b" opacity="0.7"/>
  <!-- Download button -->
  <rect x="390" y="244" width="74" height="26" rx="6" fill="#1D9E75"/>
  <text x="427" y="261" font-size="7.5" font-family="Arial,sans-serif" fill="#ffffff" text-anchor="middle" font-weight="bold">PDF for GP</text>
  <!-- Monitor stand -->
  <rect x="346" y="288" width="48" height="8" rx="4" fill="#1e293b"/>
  <rect x="330" y="295" width="80" height="5" rx="2" fill="#1e293b"/>

  <!-- PATIENT (left, seated) -->
  <!-- Chair -->
  <rect x="44" y="278" width="110" height="14" rx="5" fill="#94a3b8"/>
  <rect x="46" y="292" width="10" height="108" rx="4" fill="#94a3b8"/>
  <rect x="142" y="292" width="10" height="108" rx="4" fill="#94a3b8"/>
  <rect x="36" y="240" width="12" height="52" rx="5" fill="#94a3b8"/>
  <!-- Legs -->
  <rect x="62" y="294" width="30" height="50" rx="10" fill="#0d4f3c"/>
  <rect x="104" y="294" width="30" height="50" rx="10" fill="#0d4f3c"/>
  <!-- Lap -->
  <rect x="56" y="276" width="84" height="24" rx="10" fill="#0d4f3c"/>
  <!-- Torso -->
  <rect x="64" y="184" width="70" height="96" rx="16" fill="#1D9E75"/>
  <!-- Head -->
  <circle cx="99" cy="158" r="36" fill="#1D9E75"/>
  <!-- Hair -->
  <ellipse cx="99" cy="133" rx="36" ry="22" fill="#1a1a2e"/>
  <rect x="65" y="133" width="12" height="42" rx="6" fill="#1a1a2e"/>
  <rect x="120" y="133" width="12" height="38" rx="6" fill="#1a1a2e"/>
  <!-- Arm pointing to screen -->
  <path d="M 134 230 Q 180 210 230 218" stroke="#1D9E75" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Hand -->
  <ellipse cx="236" cy="220" rx="14" ry="11" fill="#1D9E75"/>

  <!-- DOCTOR (right, seated) -->
  <!-- Chair -->
  <rect x="448" y="278" width="110" height="14" rx="5" fill="#94a3b8"/>
  <rect x="450" y="292" width="10" height="108" rx="4" fill="#94a3b8"/>
  <rect x="546" y="292" width="10" height="108" rx="4" fill="#94a3b8"/>
  <rect x="554" y="240" width="12" height="52" rx="5" fill="#94a3b8"/>
  <!-- Legs -->
  <rect x="464" y="294" width="30" height="50" rx="10" fill="#1e293b"/>
  <rect x="506" y="294" width="30" height="50" rx="10" fill="#1e293b"/>
  <!-- Lap -->
  <rect x="458" y="276" width="84" height="24" rx="10" fill="#1e293b"/>
  <!-- White coat -->
  <rect x="466" y="182" width="70" height="98" rx="16" fill="#e2e8f0"/>
  <rect x="480" y="186" width="42" height="94" rx="10" fill="#dbeafe"/>
  <!-- Stethoscope -->
  <path d="M 480 196 C 472 218 478 234 490 240" stroke="#6b7280" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="493" cy="243" r="8" fill="#6b7280"/>
  <circle cx="493" cy="243" r="5" fill="#374151"/>
  <!-- Doctor head -->
  <circle cx="501" cy="156" r="36" fill="#374151"/>
  <!-- Hair -->
  <ellipse cx="501" cy="132" rx="32" ry="18" fill="#1a1a2e"/>
  <!-- Glasses -->
  <rect x="484" y="152" width="14" height="10" rx="4" fill="none" stroke="#9ca3af" stroke-width="2"/>
  <rect x="502" y="152" width="14" height="10" rx="4" fill="none" stroke="#9ca3af" stroke-width="2"/>
  <line x1="498" y1="157" x2="502" y2="157" stroke="#9ca3af" stroke-width="2"/>
  <!-- Doctor arm toward screen -->
  <path d="M 466 228 Q 420 208 380 216" stroke="#e2e8f0" stroke-width="18" fill="none" stroke-linecap="round"/>
  <ellipse cx="374" cy="218" rx="14" ry="11" fill="#e2e8f0"/>

  <!-- Floating context labels -->
  <rect x="30" y="30" width="140" height="50" rx="10" fill="#ecfdf5" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="100" y="52" font-size="9" font-family="Arial,sans-serif" fill="#0f172a" text-anchor="middle" font-weight="bold">10-min appointment</text>
  <text x="100" y="65" font-size="8" font-family="Arial,sans-serif" fill="#4b5563" text-anchor="middle">No more trying to remember</text>

  <rect x="420" y="420" width="160" height="44" rx="10" fill="#ecfdf5" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="500" y="440" font-size="9" font-family="Arial,sans-serif" fill="#0f172a" text-anchor="middle" font-weight="bold">Clear. Structured.</text>
  <text x="500" y="454" font-size="8" font-family="Arial,sans-serif" fill="#4b5563" text-anchor="middle">Non-diagnostic GP report</text>
</svg>
