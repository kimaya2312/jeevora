<svg width="750" height="390" viewBox="0 0 750 390" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Room background -->
  <rect width="750" height="390" fill="#ffffff"/>
  <rect x="0" y="305" width="750" height="85" fill="#f1f5f9"/>

  <!-- Windows -->
  <rect x="48" y="36" width="88" height="116" rx="6" fill="#e0f2fe" stroke="#bae6fd" stroke-width="1.5"/>
  <line x1="92" y1="36" x2="92" y2="152" stroke="#bae6fd" stroke-width="1"/>
  <line x1="48" y1="94" x2="136" y2="94" stroke="#bae6fd" stroke-width="1"/>
  <rect x="614" y="36" width="88" height="116" rx="6" fill="#e0f2fe" stroke="#bae6fd" stroke-width="1.5"/>
  <line x1="658" y1="36" x2="658" y2="152" stroke="#bae6fd" stroke-width="1"/>
  <line x1="614" y1="94" x2="702" y2="94" stroke="#bae6fd" stroke-width="1"/>

  <!-- Plant (left) -->
  <rect x="42" y="268" width="18" height="37" rx="4" fill="#a16207"/>
  <ellipse cx="51" cy="254" rx="22" ry="18" fill="#16a34a" opacity="0.85"/>
  <ellipse cx="40" cy="263" rx="14" ry="12" fill="#15803d"/>
  <ellipse cx="63" cy="261" rx="15" ry="11" fill="#16a34a" opacity="0.9"/>

  <!-- Desk -->
  <rect x="222" y="220" width="306" height="18" rx="7" fill="#c2855a"/>
  <rect x="236" y="238" width="14" height="67" rx="5" fill="#a16207"/>
  <rect x="500" y="238" width="14" height="67" rx="5" fill="#a16207"/>

  <!-- ── PATIENT (left) ── -->
  <!-- Chair -->
  <rect x="88" y="252" width="118" height="14" rx="5" fill="#94a3b8"/>
  <rect x="90" y="266" width="10" height="54" rx="4" fill="#94a3b8"/>
  <rect x="194" y="266" width="10" height="54" rx="4" fill="#94a3b8"/>
  <rect x="80" y="212" width="12" height="52" rx="5" fill="#94a3b8"/>
  <!-- Legs -->
  <rect x="110" y="262" width="30" height="46" rx="10" fill="#0d4f3c"/>
  <rect x="150" y="262" width="30" height="46" rx="10" fill="#0d4f3c"/>
  <!-- Lap/hips -->
  <rect x="104" y="246" width="86" height="22" rx="10" fill="#0d4f3c"/>
  <!-- Torso -->
  <rect x="112" y="164" width="76" height="86" rx="18" fill="#1D9E75"/>
  <!-- Head -->
  <circle cx="150" cy="140" r="34" fill="#1D9E75"/>
  <!-- Hair (long, dark) -->
  <ellipse cx="150" cy="118" rx="34" ry="20" fill="#1a1a2e"/>
  <rect x="118" y="118" width="12" height="38" rx="6" fill="#1a1a2e"/>
  <rect x="170" y="118" width="12" height="34" rx="6" fill="#1a1a2e"/>
  <!-- Arm extending toward tablet -->
  <path d="M 188 204 Q 232 188 268 196" stroke="#1D9E75" stroke-width="17" fill="none" stroke-linecap="round"/>
  <ellipse cx="272" cy="198" rx="12" ry="10" fill="#1D9E75"/>

  <!-- ── TABLET on desk ── -->
  <rect x="264" y="150" width="222" height="72" rx="12" fill="#0f172a"/>
  <rect x="272" y="157" width="206" height="58" rx="8" fill="#111827"/>
  <!-- Tablet glow border -->
  <rect x="272" y="157" width="206" height="58" rx="8" fill="none" stroke="#1D9E75" stroke-width="0.8" opacity="0.4"/>
  <!-- Tablet content -->
  <text x="284" y="174" font-size="8.5" font-family="Arial,sans-serif" fill="#1D9E75" font-weight="bold">Jeevora — GP Report</text>
  <rect x="284" y="179" width="108" height="4" rx="2" fill="#1e293b"/>
  <rect x="284" y="187" width="86" height="4" rx="2" fill="#1e293b"/>
  <rect x="284" y="195" width="68" height="4" rx="2" fill="#1e293b"/>
  <!-- GP Ready badge -->
  <rect x="406" y="175" width="64" height="28" rx="6" fill="#1D9E75"/>
  <text x="438" y="187" font-size="7" font-family="Arial,sans-serif" fill="#ffffff" text-anchor="middle">48 days</text>
  <text x="438" y="197" font-size="7" font-family="Arial,sans-serif" fill="#ffffff" text-anchor="middle" font-weight="bold">GP Ready ✓</text>
  <!-- Tablet stand -->
  <rect x="360" y="222" width="30" height="6" rx="3" fill="#1e293b"/>

  <!-- ── DOCTOR (right) ── -->
  <!-- Chair -->
  <rect x="544" y="252" width="118" height="14" rx="5" fill="#94a3b8"/>
  <rect x="546" y="266" width="10" height="54" rx="4" fill="#94a3b8"/>
  <rect x="650" y="266" width="10" height="54" rx="4" fill="#94a3b8"/>
  <rect x="658" y="212" width="12" height="52" rx="5" fill="#94a3b8"/>
  <!-- Legs -->
  <rect x="560" y="262" width="30" height="46" rx="10" fill="#1e293b"/>
  <rect x="600" y="262" width="30" height="46" rx="10" fill="#1e293b"/>
  <!-- Lap -->
  <rect x="553" y="246" width="86" height="22" rx="10" fill="#1e293b"/>
  <!-- White coat -->
  <rect x="558" y="164" width="76" height="86" rx="18" fill="#e2e8f0"/>
  <!-- Shirt -->
  <rect x="572" y="168" width="48" height="82" rx="10" fill="#dbeafe"/>
  <!-- Stethoscope -->
  <path d="M 576 176 C 567 194 572 210 583 216" stroke="#6b7280" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="586" cy="219" r="7" fill="#6b7280"/>
  <circle cx="586" cy="219" r="4" fill="#374151"/>
  <!-- Doctor arm toward tablet -->
  <path d="M 558 200 Q 524 188 494 196" stroke="#e2e8f0" stroke-width="17" fill="none" stroke-linecap="round"/>
  <ellipse cx="490" cy="198" rx="12" ry="10" fill="#e2e8f0"/>
  <!-- Head -->
  <circle cx="596" cy="138" r="34" fill="#374151"/>
  <!-- Hair -->
  <ellipse cx="596" cy="116" rx="30" ry="16" fill="#1a1a2e"/>
  <!-- Glasses -->
  <rect x="580" y="136" width="13" height="9" rx="4" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
  <rect x="597" y="136" width="13" height="9" rx="4" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="593" y1="140" x2="597" y2="140" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- ── SPEECH BUBBLES ── -->
  <!-- Patient bubble -->
  <rect x="28" y="80" width="122" height="54" rx="12" fill="#ecfdf5" stroke="#1D9E75" stroke-width="1.5"/>
  <polygon points="98,134 116,150 88,140" fill="#ecfdf5"/>
  <line x1="88" y1="140" x2="98" y2="134" stroke="#1D9E75" stroke-width="1.5"/>
  <line x1="88" y1="140" x2="116" y2="150" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="89" y="101" font-size="8" font-family="Arial,sans-serif" fill="#0f172a" text-anchor="middle" font-weight="bold">48 days logged.</text>
  <text x="89" y="114" font-size="7" font-family="Arial,sans-serif" fill="#4b5563" text-anchor="middle">Everything is in</text>
  <text x="89" y="126" font-size="7" font-family="Arial,sans-serif" fill="#4b5563" text-anchor="middle">my GP report.</text>

  <!-- Doctor bubble -->
  <rect x="600" y="80" width="122" height="54" rx="12" fill="#ecfdf5" stroke="#1D9E75" stroke-width="1.5"/>
  <polygon points="652,134 634,150 662,140" fill="#ecfdf5"/>
  <line x1="662" y1="140" x2="652" y2="134" stroke="#1D9E75" stroke-width="1.5"/>
  <line x1="662" y1="140" x2="634" y2="150" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="661" y="101" font-size="8" font-family="Arial,sans-serif" fill="#0f172a" text-anchor="middle" font-weight="bold">Very clear history.</text>
  <text x="661" y="114" font-size="7" font-family="Arial,sans-serif" fill="#4b5563" text-anchor="middle">This helps me</text>
  <text x="661" y="126" font-size="7" font-family="Arial,sans-serif" fill="#4b5563" text-anchor="middle">understand you.</text>

  <!-- Green footer bar -->
  <rect x="0" y="386" width="750" height="4" fill="#1D9E75"/>
</svg>
