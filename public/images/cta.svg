<svg width="325" height="206" viewBox="0 0 325 206" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="325" height="206" fill="#f8fafc" rx="12"/>
  <rect x="0" y="155" width="325" height="51" fill="#f1f5f9"/>

  <!-- Door frame (GP office) -->
  <rect x="220" y="40" width="68" height="115" rx="4" fill="#e2e8f0"/>
  <rect x="226" y="46" width="56" height="103" rx="3" fill="#f8fafc"/>
  <circle cx="234" cy="100" r="4" fill="#94a3b8"/>
  <line x1="280" y1="50" x2="280" y2="80" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="280" y1="130" x2="280" y2="145" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="236" y="58" width="36" height="16" rx="4" fill="#dbeafe"/>
  <text x="254" y="69" font-size="7" font-family="Arial,sans-serif" fill="#1e40af" text-anchor="middle" font-weight="bold">GP Office</text>

  <!-- ── Central phone (replaces human figure) ── -->

  <!-- Phone body -->
  <rect x="138" y="55" width="48" height="92" rx="9" fill="#0f172a"/>
  <rect x="141" y="61" width="42" height="80" rx="6" fill="#111827"/>
  <!-- Speaker notch -->
  <rect x="154" y="58" width="14" height="2.5" rx="1.25" fill="#374151"/>
  <!-- Home bar -->
  <rect x="156" y="145" width="12" height="2" rx="1" fill="#374151"/>

  <!-- Screen: top bar -->
  <rect x="143" y="63" width="38" height="10" rx="2" fill="#1e293b"/>
  <text x="162" y="71" font-size="4.5" font-family="Arial,sans-serif" fill="#1D9E75" text-anchor="middle" font-weight="bold">GP Report</text>

  <!-- Screen: GP Ready circle badge -->
  <circle cx="162" cy="96" r="16" fill="#1D9E75"/>
  <path d="M 154 96 L 159 101 L 170 90" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Screen: status labels -->
  <text x="162" y="117" font-size="5" font-family="Arial,sans-serif" fill="#4ade80" text-anchor="middle" font-weight="bold">GP Ready ✓</text>
  <text x="162" y="125" font-size="4" font-family="Arial,sans-serif" fill="#94a3b8" text-anchor="middle">48 days tracked</text>

  <!-- Screen: mini metric bars -->
  <rect x="147" y="129" width="30" height="3" rx="1.5" fill="#1e293b"/>
  <rect x="147" y="129" width="25" height="3" rx="1.5" fill="#1D9E75" opacity="0.8"/>
  <rect x="147" y="134" width="30" height="3" rx="1.5" fill="#1e293b"/>
  <rect x="147" y="134" width="18" height="3" rx="1.5" fill="#818cf8" opacity="0.8"/>

  <!-- Dashed arrow: phone → GP door (tells the story) -->
  <line x1="188" y1="101" x2="218" y2="101" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
  <polygon points="219,101 214,98 214,104" fill="#1D9E75" opacity="0.7"/>

  <!-- Decorative floating data dots (suggest data flowing in) -->
  <circle cx="116" cy="82"  r="3.5" fill="#1D9E75"  opacity="0.18"/>
  <circle cx="108" cy="102" r="2.5" fill="#818cf8"  opacity="0.22"/>
  <circle cx="118" cy="122" r="3"   fill="#f59e0b"  opacity="0.20"/>
  <circle cx="105" cy="120" r="2"   fill="#ec4899"  opacity="0.18"/>

  <!-- Floating "Walk in prepared" badge (left) -->
  <rect x="20" y="56" width="100" height="52" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="70" y="74" font-size="8" font-family="Arial,sans-serif" fill="#0f172a" text-anchor="middle" font-weight="bold">Walk in prepared.</text>
  <text x="70" y="86" font-size="7" font-family="Arial,sans-serif" fill="#4b5563" text-anchor="middle">Every symptom.</text>
  <text x="70" y="97" font-size="7" font-family="Arial,sans-serif" fill="#4b5563" text-anchor="middle">Every date. Ready.</text>

  <!-- Green accent line -->
  <rect x="0" y="203" width="325" height="3" fill="#1D9E75"/>
</svg>
